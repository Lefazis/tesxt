<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ChatBot ATGP Beta</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial;
    background: #0f172a;
    height: 100vh;
    display: flex;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #020617;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    border-right: 1px solid #1e293b;
}

.logo {
    width: 120px;
    margin-bottom: 20px;
    border-radius: 10px;
}

.sidebar h3 {
    margin-bottom: 10px;
    font-size: 14px;
    opacity: 0.7;
}

.sidebar p {
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}

/* CONTEÚDO PRINCIPAL */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    background: #020617;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e293b;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.header-logo {
    width: 40px;
    border-radius: 6px;
}

.header-title {
    font-weight: bold;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* MENSAGENS */
.msg {
    padding: 12px 14px;
    border-radius: 12px;
    max-width: 70%;
    animation: fadeIn 0.2s ease-in-out;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* DIGITANDO */
.typing {
    font-size: 13px;
    opacity: 0.7;
    font-style: italic;
}

/* INPUT */
footer {
    display: flex;
    padding: 12px;
    background: #020617;
    border-top: 1px solid #1e293b;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(5px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* SCROLL */
#chat::-webkit-scrollbar {
    width: 6px;
}
#chat::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}

/* RESPONSIVO */
@media (max-width: 700px) {
    .sidebar {
        display: none;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <img src="/static/logo_universidade.png" class="logo">
    <h3>ATGP Projeções</h3>

    <img src="/static/logo_grupo.png" class="logo">
    <h3>Grupo</h3>

    <p> Antonio Érico, Caio Vilaça, Claudia Batista, Moisés Gomes.<br>(Automação Industrial 3º Período)</p>
</div>

<!-- CONTEÚDO -->
<div class="main">

<header>
    <div class="header-left">
        <img src="/static/logo_grupo.png" class="header-logo">
        <span class="header-title">Chat IA</span>
    </div>
</header>

<div id="chat"></div>

<footer>
    <input type="text" id="mensagem" placeholder="Digite sua mensagem...">
    <button onclick="enviar()">Enviar</button>
</footer>

</div>

<script>
let chat = document.getElementById("chat");

function adicionarMensagem(texto, classe) {
    let div = document.createElement("div");
    div.className = "msg " + classe;
    div.innerText = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function mostrarDigitando() {
    let div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerText = "Digitando...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removerDigitando() {
    let typing = document.getElementById("typing");
    if (typing) typing.remove();
}

async function enviar() {
    let input = document.getElementById("mensagem");
    let msg = input.value;

    if (!msg) return;

    adicionarMensagem(msg, "user");
    input.value = "";

    mostrarDigitando();

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ mensagem: msg })
    });

    let data = await res.json();

    removerDigitando();
    adicionarMensagem(data.resposta, "bot");
}

document.getElementById("mensagem")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") enviar();
});

window.onload = () => {
    adicionarMensagem("Bem-vindo ao ChatBot desenvolvido pelo grupo ATGP", "bot");
};
</script>

</body>
</html>
